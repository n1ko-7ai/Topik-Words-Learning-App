<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>한국어능력시험 96회 | 필수 어휘</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        .page-title {
            font-weight: 700;
            font-size: 2.2rem;
        }

        .word-card {
            transition: 0.2s ease;
            border: none;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

            .word-card:hover {
                transform: translateY(-4px);
            }

        .card-header-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .word-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .check-btn {
            border: none;
            background: transparent;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

            .check-btn:hover {
                transform: scale(1.1);
            }

        .checked {
            color: #198754;
        }

        .unchecked {
            color: #c5c5c5;
        }

        .translation {
            font-size: 1.05rem;
            color: #444;
        }

        .selected-counter {
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="page-title">한국어능력시험 96회를 위한 필수 어휘</h1>

            <div class="selected-counter">
                선택된 단어 수:
                <span id="selectedCount">
                    {{ selected_words|length }}
                </span>
            </div>
            <div class="d-flex gap-2 align-items-center mb-4">

                <button id="startTrainingBtn"
                        class="btn btn-dark btn-lg">
                    시작하기
                </button>

                <button id="selectAllBtn"
                        class="btn btn-success">
                    전체 선택
                </button>

                <button id="clearAllBtn"
                        class="btn btn-outline-danger">
                    전체 해제
                </button>

                <div id="errorBox"
                     class="alert alert-danger py-2 px-3 m-0 d-none">
                </div>

            </div>
        </div>

        <div class="row g-4">

            {% for word, translation in words.items() %}

            <div class="col-md-6 col-lg-4">
                <div class="card word-card h-100">

                    <div class="card-header card-header-custom">

                        <h5 class="word-title">
                            {{ word }}
                        </h5>

                        <button class="check-btn toggle-word-btn"
                                data-word="{{ word }}">

                            {% if word in selected_words %}
                            <i class="bi bi-check-circle-fill checked"></i>
                            {% else %}
                            <i class="bi bi-check-circle unchecked"></i>
                            {% endif %}

                        </button>

                    </div>

                    <div class="card-body">
                        <p class="translation">
                            {{ translation }}
                        </p>
                    </div>

                </div>
            </div>

            {% endfor %}

        </div>
    </div>

    <script>

        const buttons = document.querySelectorAll(".toggle-word-btn");
        const selectedCount = document.getElementById("selectedCount");

        buttons.forEach(button => {

        button.addEventListener("click", async () => {

        const word = button.dataset.word;

        try {

        const response = await fetch("/api/toggle_word", {
        method: "POST",
        headers: {
        "Content-Type": "application/json"
        },
        body: JSON.stringify({
        word: word
        })
        });

        const data = await response.json();

        if (data.success) {

        const icon = button.querySelector("i");

        if (data.added) {

        icon.classList.remove(
        "bi-check-circle",
        "unchecked"
        );

        icon.classList.add(
        "bi-check-circle-fill",
        "checked"
        );

        } else {

        icon.classList.remove(
        "bi-check-circle-fill",
        "checked"
        );

        icon.classList.add(
        "bi-check-circle",
        "unchecked"
        );
        }

        selectedCount.textContent = data.words.length;
        }

        } catch (error) {
        console.error(error);
        }

        });

        });

        const startTrainingBtn =
        document.getElementById("startTrainingBtn");

        const errorBox =
            document.getElementById("errorBox");

        startTrainingBtn.addEventListener("click", async () => {

            try {

                const response = await fetch(
                    "/api/set-game-words",
                    {
                        method: "POST"
                    }
                );

                const data = await response.json();

                // если ошибка
                if (!data.success) {

                    errorBox.textContent = data.message;

                    errorBox.classList.remove("d-none");

                    return;
                }

                // переход к игре
                window.location.href = data.redirect;

            } catch (error) {

                errorBox.textContent =
                    "서버 오류가 발생했습니다.";

                errorBox.classList.remove("d-none");

                console.error(error);

            }

        });

        const selectAllBtn =
            document.getElementById("selectAllBtn");

        const clearAllBtn =
            document.getElementById("clearAllBtn");

        // ВЫБРАТЬ ВСЕ
        selectAllBtn.addEventListener("click", async () => {

            try {

                const response = await fetch(
                    "/api/select_all_words",
                    {
                        method: "POST"
                    }
                );

                const data = await response.json();

                if (data.success) {

                    // обновляем счетчик
                    selectedCount.textContent =
                        data.words.length;

                    // обновляем ВСЕ иконки
                    buttons.forEach(button => {

                        const icon =
                            button.querySelector("i");

                        icon.classList.remove(
                            "bi-check-circle",
                            "unchecked"
                        );

                        icon.classList.add(
                            "bi-check-circle-fill",
                            "checked"
                        );

                    });

                }

            } catch (error) {

                console.error(error);

            }

        });

        // УБРАТЬ ВСЕ
        clearAllBtn.addEventListener("click", async () => {

            try {

                const response = await fetch(
                    "/api/clear_all_words",
                    {
                        method: "POST"
                    }
                );

                const data = await response.json();

                if (data.success) {

                    // обновляем счетчик
                    selectedCount.textContent = 0;

                    // обновляем ВСЕ иконки
                    buttons.forEach(button => {

                        const icon =
                            button.querySelector("i");

                        icon.classList.remove(
                            "bi-check-circle-fill",
                            "checked"
                        );

                        icon.classList.add(
                            "bi-check-circle",
                            "unchecked"
                        );

                    });

                }

            } catch (error) {

                console.error(error);

            }

        });

    </script>

</body>
</html>
